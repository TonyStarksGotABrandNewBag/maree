# M.A.R.E.E. — Fly.io deployment.
#
# One-time setup (Sir does this, see deployed.md):
#   flyctl auth login
#   flyctl apps create maree
#   flyctl secrets set ANTHROPIC_API_KEY=sk-ant-...   # optional, enables LLM triage
#
# Per-deploy (CI does this via .github/workflows/ci.yml):
#   flyctl deploy --config fly.toml --dockerfile docker/Dockerfile

app = "maree"
primary_region = "iad"   # Ashburn, VA — close to most US users

[build]
  dockerfile = "docker/Dockerfile"

[env]
  PORT = "8080"
  OMP_NUM_THREADS = "2"
  MKL_NUM_THREADS = "2"
  OPENBLAS_NUM_THREADS = "2"
  KMP_DUPLICATE_LIB_OK = "TRUE"

[http_service]
  internal_port = 8080
  force_https = true
  # Auto-stop the machine after the idle window so we stay inside the
  # Fly free allowance. First request after idle pays a ~2s cold start.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"   # sklearn RF + drift state fits comfortably; bump to 2gb if OOM
