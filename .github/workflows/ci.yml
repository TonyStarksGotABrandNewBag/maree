name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancel in-flight runs when a new commit lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  # Cap thread pools — keeps GH runners stable and matches production env.
  OMP_NUM_THREADS: "2"
  MKL_NUM_THREADS: "2"
  OPENBLAS_NUM_THREADS: "2"
  KMP_DUPLICATE_LIB_OK: "TRUE"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.8.0
      - name: ruff check
        run: ruff check src/ tests/ scripts/

  test:
    # The non-torch suite. Running torch in the same process as
    # xgboost/lightgbm/catboost segfaults on macOS Apple Silicon; on Linux
    # CI runners it usually works, but we keep the same isolation pattern
    # for parity with local dev.
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: pytest (non-torch)
        run: pytest tests/ --ignore=tests/test_models_torch.py -q

  test-torch:
    # Torch tests in their own job — fresh interpreter, no sibling native libs.
    # Installs requirements-test.txt on top of requirements.txt because torch
    # is excluded from production requirements (kept the production image slim
    # and avoided OOM during Render's free-tier wheel resolution).
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt
      - name: pytest (torch only)
        run: pytest tests/test_models_torch.py -q

  train-and-release:
    # Train the production model on the GitHub-hosted runner (7 GB RAM, no
    # CPU pressure) and publish the resulting artifacts as a GitHub Release.
    # The Dockerfile then fetches them at build time — Render only has to
    # pip-install + curl two files, which keeps its free-tier build inside
    # the 15-minute / 512-MB envelope.
    runs-on: ubuntu-latest
    needs: [test, test-torch]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write   # required by `gh release create`
    env:
      # The training script does `from src import config`, which on a clean
      # runner doesn't resolve unless the repo root is on PYTHONPATH (it
      # works locally because IDEs / pytest plant it there for you).
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Download Brazilian Malware Dataset
        run: python scripts/download_data.py
      - name: Train production model
        run: python scripts/train_production_model.py
      - name: Verify artifacts
        run: |
          ls -lah artifacts/
          test -f artifacts/maree_production.joblib
          test -f artifacts/demo_samples.json
      - name: Publish artifacts as `model-latest` Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Stable tag — overwrite each push so the Dockerfile URL never changes.
          if gh release view model-latest >/dev/null 2>&1; then
            gh release delete model-latest --yes --cleanup-tag
          fi
          gh release create model-latest \
            --title "Production model — ${GITHUB_SHA::7}" \
            --notes "Auto-built by CI from commit ${GITHUB_SHA}. Render fetches these at \`docker build\` time." \
            artifacts/maree_production.joblib \
            artifacts/demo_samples.json

  deploy:
    # Trigger Render to redeploy from main. The Dockerfile no longer trains
    # the model in-container — it fetches the freshly-published artifacts
    # from the `model-latest` GitHub Release that train-and-release just
    # produced. Render's build is now ~2 min instead of ~15.
    runs-on: ubuntu-latest
    needs: [test, test-torch, train-and-release]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-render
      cancel-in-progress: false   # never abort a half-finished deploy
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set." >&2
            echo "See deployed.md for one-time setup steps." >&2
            exit 1
          fi
          response=$(curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL")
          echo "Render accepted deploy: $response"

      - name: Smoke test /health
        run: |
          # Render's free-tier build runs the dataset clone + model train
          # inside the Dockerfile (~3-5 min), then boots the service.
          # Poll generously — first deploy on a cold service can take a
          # couple of minutes before /health responds.
          for attempt in $(seq 1 30); do
            response=$(curl -fsS -m 10 https://maree-f8c8.onrender.com/health || true)
            if echo "$response" | grep -q '"status":"ok"'; then
              echo "Health check passed on attempt $attempt:"
              echo "$response" | python -m json.tool
              exit 0
            fi
            echo "Attempt $attempt: health endpoint not ready yet, sleeping 20s…"
            sleep 20
          done
          echo "Health check failed after 30 attempts (~10 min wall time)" >&2
          exit 1
